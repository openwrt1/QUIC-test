apiVersion: app.claw.cloud/v1
kind: Template
metadata:
  name: quic-test
spec:
  title: "QUIC UDP Echo Test"
  description: "Test UDP/QUIC datagram forwarding"
  templateType: inline
  categories:
    - tool
  defaults:
    app_name:
      type: string
      value: quic-test-${{ random(8) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${{ defaults.app_name }}-restarter
  labels:
    run.claw.cloud/app-deploy-manager: ${{ defaults.app_name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${{ defaults.app_name }}-restart-role
  labels:
    run.claw.cloud/app-deploy-manager: ${{ defaults.app_name }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${{ defaults.app_name }}-restart-binding
  labels:
    run.claw.cloud/app-deploy-manager: ${{ defaults.app_name }}
subjects:
  - kind: ServiceAccount
    name: ${{ defaults.app_name }}-restarter
roleRef:
  kind: Role
  name: ${{ defaults.app_name }}-restart-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    run.claw.cloud/app-deploy-manager: ${{ defaults.app_name }}
spec:
  type: NodePort
  ports:
    - name: udp-echo
      port: 23112
      targetPort: 23112
      protocol: UDP
  selector:
    app: ${{ defaults.app_name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ defaults.app_name }}
  annotations:
    originImageName: ghcr.io/openwrt1/quic-test:main
    deploy.run.claw.cloud/minReplicas: "1"
    deploy.run.claw.cloud/maxReplicas: "1"
  labels:
    run.claw.cloud/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}
    spec:
      containers:
        - name: ${{ defaults.app_name }}
          image: ghcr.io/openwrt1/quic-test:main
          imagePullPolicy: Always
          ports:
            - name: udp-echo
              containerPort: 23112
              protocol: UDP
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ${{ defaults.app_name }}-restart
  labels:
    run.claw.cloud/app-deploy-manager: ${{ defaults.app_name }}
spec:
  schedule: "0 5 * * *"          # UTC+8 凌晨 5:00（北京时间）
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ${{ defaults.app_name }}-restarter
          restartPolicy: OnFailure
          containers:
            - name: kubectl-restart
              image: bitnami/kubectl:latest
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  kubectl rollout restart deployment/${{ defaults.app_name }}
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
